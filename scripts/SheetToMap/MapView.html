<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Location Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: Google Sans, Roboto, sans-serif;
      font-size: 14px;
    }

    /* ── Sidebar (layers panel) ── */
    #sidebar {
      width: 240px;
      min-width: 180px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 1;
      box-shadow: 2px 0 6px rgba(0,0,0,.12);
    }

    #sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e0e0e0;
    }

    #sidebar-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #202124;
    }

    #sidebar-header p {
      font-size: 12px;
      color: #5f6368;
      margin-top: 2px;
    }

    #layers-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      user-select: none;
    }

    .layer-item:hover { background: #f1f3f4; }

    .layer-item input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: #1a73e8;
      cursor: pointer;
      flex-shrink: 0;
    }

    .layer-item label {
      cursor: pointer;
      color: #202124;
      flex: 1;
    }

    .layer-count {
      color: #5f6368;
      font-size: 12px;
    }

    /* ── Status legend ── */
    #legend {
      border-top: 1px solid #e0e0e0;
      padding: 10px 16px 14px;
    }

    #legend h3 {
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      color: #202124;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Toolbar ── */
    #toolbar {
      padding: 8px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #status-text {
      font-size: 12px;
      color: #5f6368;
    }

    #refresh-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    #refresh-btn:hover { background: #1557b0; }
    #refresh-btn:disabled { background: #a8c7fa; cursor: default; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Spinner ── */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,.9);
      padding: 20px 28px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
      font-size: 14px;
      color: #202124;
      z-index: 10;
    }

    @media (max-width: 600px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #e0e0e0; max-height: 45vh; }
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Layers</h2>
    <p id="loc-count">Loading…</p>
  </div>
  <div id="toolbar">
    <span id="status-text">Auto-refreshes every 60s</span>
    <button id="refresh-btn" onclick="manualRefresh()">Refresh</button>
  </div>
  <div id="layers-list"></div>
  <div id="legend">
    <h3>Status</h3>
    <div id="legend-items"></div>
  </div>
</div>

<div id="map"></div>
<div id="loading">Loading map…</div>

<script>
  // Injected by Apps Script at render time
  const STATUS_COLORS = {
    'Active':      '#34A853',
    'Approved':    '#34A853',
    'Complete':    '#34A853',
    'Pending':     '#FBBC04',
    'In Progress': '#FBBC04',
    'Review':      '#FBBC04',
    'Closed':      '#EA4335',
    'Rejected':    '#EA4335',
    'Inactive':    '#EA4335',
  };
  const DEFAULT_COLOR = '#4285F4';

  let map;
  let allMarkers = [];       // { marker, infoWindow, layer }
  let layerVisibility = {};  // { layerName: boolean }
  let openInfoWindow = null;
  let refreshTimer = null;
  let apiKey = '';

  // ── Fetch API key then bootstrap Maps JS API ──
  google.script.run
    .withSuccessHandler(key => {
      apiKey = key;
      const script = document.createElement('script');
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key)
                 + '&libraries=marker&callback=initMap&v=beta';
      script.async = true;
      document.head.appendChild(script);
    })
    .withFailureHandler(err => showError('Could not load API key: ' + err.message))
    .getApiKey();

  // ── Map init ──
  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 39.5, lng: -98.35 },
      zoom: 4,
      mapId: 'DEMO_MAP_ID',
      disableDefaultUI: false,
      zoomControl: true,
      mapTypeControl: false,
      streetViewControl: false,
    });

    loadLocations();
    refreshTimer = setInterval(loadLocations, 60000);
  }

  // ── Load / reload locations ──
  function loadLocations() {
    setRefreshButton(true);
    google.script.run
      .withSuccessHandler(renderMap)
      .withFailureHandler(err => {
        showError('Failed to load data: ' + err.message);
        setRefreshButton(false);
      })
      .getLocations();
  }

  function manualRefresh() {
    clearInterval(refreshTimer);
    loadLocations();
    refreshTimer = setInterval(loadLocations, 60000);
  }

  // ── Render all markers ──
  function renderMap(locations) {
    clearMarkers();

    const bounds = new google.maps.LatLngBounds();
    const layerGroups = {};  // layerName → [locationObj]

    for (const loc of locations) {
      if (!layerGroups[loc.layer]) layerGroups[loc.layer] = [];
      layerGroups[loc.layer].push(loc);
    }

    // Preserve existing layer visibility choices; default new layers to visible
    for (const layerName of Object.keys(layerGroups)) {
      if (!(layerName in layerVisibility)) layerVisibility[layerName] = true;
    }

    for (const [layerName, locs] of Object.entries(layerGroups)) {
      for (const loc of locs) {
        const pos = { lat: loc.lat, lng: loc.lng };
        bounds.extend(pos);

        const pin = new google.maps.marker.PinElement({
          background:  loc.color,
          borderColor: shadeColor(loc.color, -30),
          glyphColor:  '#ffffff',
        });

        const marker = new google.maps.marker.AdvancedMarkerElement({
          position: pos,
          map: layerVisibility[layerName] ? map : null,
          title: loc.name,
          content: pin.element,
        });

        const infoWindow = new google.maps.InfoWindow({
          content: buildInfoContent(loc),
        });

        marker.addListener('click', () => {
          if (openInfoWindow) openInfoWindow.close();
          infoWindow.open({ anchor: marker, map });
          openInfoWindow = infoWindow;
        });

        allMarkers.push({ marker, infoWindow, layer: layerName });
      }
    }

    if (locations.length > 0) map.fitBounds(bounds);

    buildLayerPanel(layerGroups);
    buildLegend(locations);

    document.getElementById('loc-count').textContent =
      locations.length + ' location' + (locations.length !== 1 ? 's' : '');
    document.getElementById('loading').style.display = 'none';
    setRefreshButton(false);

    const now = new Date();
    document.getElementById('status-text').textContent =
      'Updated ' + now.toLocaleTimeString();
  }

  // ── Clear existing markers ──
  function clearMarkers() {
    for (const { marker, infoWindow } of allMarkers) {
      marker.map = null;
      infoWindow.close();
    }
    allMarkers = [];
    openInfoWindow = null;
  }

  // ── Layer panel ──
  function buildLayerPanel(layerGroups) {
    const container = document.getElementById('layers-list');
    container.innerHTML = '';

    for (const [layerName, locs] of Object.entries(layerGroups)) {
      const item = document.createElement('div');
      item.className = 'layer-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'layer-' + layerName;
      cb.checked = layerVisibility[layerName];
      cb.addEventListener('change', () => toggleLayer(layerName, cb.checked));

      const label = document.createElement('label');
      label.htmlFor = cb.id;
      label.textContent = layerName;

      const count = document.createElement('span');
      count.className = 'layer-count';
      count.textContent = locs.length;

      item.append(cb, label, count);
      container.appendChild(item);
    }
  }

  function toggleLayer(layerName, visible) {
    layerVisibility[layerName] = visible;
    for (const { marker, layer } of allMarkers) {
      if (layer === layerName) marker.map = visible ? map : null;
    }
  }

  // ── Status legend ──
  function buildLegend(locations) {
    const seen = new Set();
    const container = document.getElementById('legend-items');
    container.innerHTML = '';

    for (const loc of locations) {
      if (seen.has(loc.status)) continue;
      seen.add(loc.status);

      const item = document.createElement('div');
      item.className = 'legend-item';

      const dot = document.createElement('div');
      dot.className = 'legend-dot';
      dot.style.background = loc.color;

      const label = document.createElement('span');
      label.textContent = loc.status || 'Unknown';

      item.append(dot, label);
      container.appendChild(item);
    }
  }

  // ── Info window content ──
  function buildInfoContent(loc) {
    const statusColor = loc.color;
    return `
      <div style="font-family:Google Sans,Roboto,sans-serif;min-width:180px;max-width:260px">
        <strong style="font-size:14px;color:#202124">${escHtml(loc.name)}</strong>
        <div style="margin-top:6px;display:flex;align-items:center;gap:6px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${statusColor}"></span>
          <span style="font-size:13px;color:#202124">${escHtml(loc.status)}</span>
        </div>
        ${loc.layer && loc.layer !== 'Ungrouped'
          ? `<div style="font-size:12px;color:#5f6368;margin-top:4px">Layer: ${escHtml(loc.layer)}</div>`
          : ''}
        ${loc.address
          ? `<div style="font-size:12px;color:#5f6368;margin-top:4px">${escHtml(loc.address)}</div>`
          : ''}
      </div>`;
  }

  // ── Utilities ──
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function shadeColor(hex, pct) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, Math.max(0, (n >> 16) + pct));
    const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + pct));
    const b = Math.min(255, Math.max(0, (n & 0xff) + pct));
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  function setRefreshButton(loading) {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Loading…' : 'Refresh';
  }

  function showError(msg) {
    document.getElementById('loading').textContent = 'Error: ' + msg;
  }
</script>
</body>
</html>
