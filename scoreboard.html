<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kids Sports Scoreboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFD700;
      --red:    #FF2222;
      --green:  #00FF55;
      --white:  #FFFFFF;
      --border: 3px solid #fff;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Orbitron', 'Courier New', monospace;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* ── Scoreboard container ── */
    .board {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Clock ── */
    .clock-row {
      display: flex;
      justify-content: center;
    }

    .clock-box {
      border: var(--border);
      background: #000;
      padding: 10px 36px;
    }

    .clock-digits {
      font-size: clamp(56px, 14vw, 118px);
      font-weight: 900;
      color: var(--yellow);
      text-shadow:
        0 0 8px var(--yellow),
        0 0 24px var(--yellow),
        0 0 48px rgba(255,215,0,.4);
      letter-spacing: 10px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* ── Team labels ── */
    .labels-row {
      display: flex;
      align-items: center;
      padding: 0 6px;
    }

    .team-label {
      flex: 1;
      font-size: clamp(13px, 3.2vw, 22px);
      font-weight: 700;
      color: var(--white);
      text-align: center;
      letter-spacing: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .per-label {
      font-size: clamp(11px, 2.5vw, 17px);
      font-weight: 700;
      color: var(--white);
      letter-spacing: 1px;
      min-width: 72px;
      text-align: center;
    }

    /* ── Score row ── */
    .scores-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    /* Tap the whole panel to score +1 */
    .score-panel {
      flex: 1;
      border: var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      cursor: pointer;
      min-height: clamp(130px, 26vw, 210px);
      position: relative;
      overflow: hidden;
    }

    .score-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 34, 34, .22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }

    .score-panel.scored::after { opacity: 1; }

    .score-num {
      font-size: clamp(68px, 17vw, 148px);
      font-weight: 900;
      color: var(--red);
      text-shadow:
        0 0 10px var(--red),
        0 0 28px var(--red),
        0 0 56px rgba(255,34,34,.4);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: transform .15s;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .score-num.pop { animation: pop .22s ease; }

    /* +2 +3 -1 buttons inside panel */
    .adj-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .adj-btn {
      font-family: 'Orbitron', monospace;
      font-size: clamp(10px, 2.2vw, 13px);
      font-weight: 700;
      background: #1c1c1c;
      color: #bbb;
      border: 1px solid #484848;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 2px;
    }

    .adj-btn:active { background: #3a3a3a; color: #fff; }

    /* Period panel */
    .period-panel {
      border: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      min-width: 72px;
    }

    .period-num {
      font-size: clamp(38px, 9vw, 78px);
      font-weight: 900;
      color: var(--green);
      text-shadow:
        0 0 10px var(--green),
        0 0 28px var(--green);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* ── Control bar ── */
    .controls-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .ctrl-btn {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: clamp(10px, 2.4vw, 13px);
      background: #111;
      color: #ccc;
      border: 2px solid #484848;
      padding: 9px 18px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .ctrl-btn:active { background: #2a2a2a; }

    .ctrl-btn.play {
      color: var(--yellow);
      border-color: var(--yellow);
    }

    /* ── Period-end / Game-over banner ── */
    .banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      align-items: center;
      justify-content: center;
      z-index: 600;
    }

    .banner.show { display: flex; }

    .banner-box {
      border: 3px solid var(--yellow);
      background: #050505;
      padding: 36px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .banner-box h2 {
      font-size: clamp(20px, 5vw, 30px);
      color: var(--yellow);
      letter-spacing: 3px;
      margin-bottom: 14px;
    }

    .banner-box p {
      font-size: clamp(12px, 2.8vw, 15px);
      color: #ddd;
      margin-bottom: 24px;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    /* ── Settings modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #080808;
      border: 2px solid var(--yellow);
      padding: 28px 28px 24px;
      width: 90%;
      max-width: 400px;
    }

    .modal h2 {
      color: var(--yellow);
      font-size: 16px;
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 22px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      color: #888;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      background: #161616;
      border: 1px solid #444;
      color: #fff;
      padding: 10px 12px;
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      outline: none;
    }

    .field input:focus { border-color: var(--yellow); }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .modal-btns button {
      flex: 1;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 12px 8px;
      cursor: pointer;
      background: transparent;
      border: 2px solid #484848;
      color: #aaa;
    }

    .modal-btns button.primary {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .modal-btns button:active { background: rgba(255,255,255,.06); }
  </style>
</head>
<body>

<!-- ════════════════ Settings Modal ════════════════ -->
<div class="modal-overlay open" id="modalOverlay">
  <div class="modal">
    <h2>GAME SETUP</h2>

    <div class="field">
      <label>HOME TEAM NAME</label>
      <input id="inp-home" type="text" value="HOME" maxlength="12" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>VISITOR TEAM NAME</label>
      <input id="inp-visitor" type="text" value="VISITOR" maxlength="12" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>MINUTES PER PERIOD</label>
      <input id="inp-minutes" type="number" value="10" min="1" max="99" inputmode="numeric">
    </div>
    <div class="field">
      <label>NUMBER OF PERIODS</label>
      <input id="inp-periods" type="number" value="4" min="1" max="10" inputmode="numeric">
    </div>

    <div class="modal-btns">
      <button id="cancelBtn" onclick="closeModal()">CANCEL</button>
      <button class="primary" onclick="applySettings()">START GAME</button>
    </div>
  </div>
</div>

<!-- ════════════════ Period-end / Game-over Banner ════════════════ -->
<div class="banner" id="banner">
  <div class="banner-box">
    <h2 id="bannerTitle">END OF PERIOD</h2>
    <p id="bannerMsg"></p>
    <button class="ctrl-btn play" onclick="dismissBanner()">CONTINUE</button>
  </div>
</div>

<!-- ════════════════ Scoreboard ════════════════ -->
<div class="board">

  <!-- Clock -->
  <div class="clock-row">
    <div class="clock-box">
      <div class="clock-digits" id="clock">10:00</div>
    </div>
  </div>

  <!-- Team labels -->
  <div class="labels-row">
    <div class="team-label" id="lbl-home">HOME</div>
    <div class="per-label">PER</div>
    <div class="team-label" id="lbl-visitor">VISITOR</div>
  </div>

  <!-- Scores + Period -->
  <div class="scores-row">

    <!-- Home -->
    <div class="score-panel" id="panel-home" onclick="scoreTeam('home', 1)">
      <div class="score-num" id="num-home">0</div>
      <div class="adj-row" onclick="event.stopPropagation()">
        <button class="adj-btn" onclick="scoreTeam('home', 2)">+2</button>
        <button class="adj-btn" onclick="scoreTeam('home', 3)">+3</button>
        <button class="adj-btn" onclick="scoreTeam('home', -1)">-1</button>
      </div>
    </div>

    <!-- Period -->
    <div class="period-panel">
      <div class="period-num" id="num-period">1</div>
    </div>

    <!-- Visitor -->
    <div class="score-panel" id="panel-visitor" onclick="scoreTeam('visitor', 1)">
      <div class="score-num" id="num-visitor">0</div>
      <div class="adj-row" onclick="event.stopPropagation()">
        <button class="adj-btn" onclick="scoreTeam('visitor', 2)">+2</button>
        <button class="adj-btn" onclick="scoreTeam('visitor', 3)">+3</button>
        <button class="adj-btn" onclick="scoreTeam('visitor', -1)">-1</button>
      </div>
    </div>

  </div>

  <!-- Controls -->
  <div class="controls-row">
    <button class="ctrl-btn play" id="playBtn" onclick="toggleTimer()">PLAY</button>
    <button class="ctrl-btn" onclick="resetPeriodTimer()">RESET</button>
    <button class="ctrl-btn" onclick="nextPeriod()">NEXT PER</button>
    <button class="ctrl-btn" onclick="openModal()">SETTINGS</button>
  </div>

</div><!-- /.board -->

<script>
  // ── State ──────────────────────────────────────────────────
  const state = {
    homeScore:    0,
    visitorScore: 0,
    period:       1,
    totalPeriods: 4,
    totalMins:    10,
    timeLeft:     600,
    running:      false,
    gameOver:     false,
    firstLoad:    true,
  };

  let ticker = null;

  // ── DOM refs ───────────────────────────────────────────────
  const clockEl    = document.getElementById('clock');
  const numHome    = document.getElementById('num-home');
  const numVisitor = document.getElementById('num-visitor');
  const numPeriod  = document.getElementById('num-period');
  const lblHome    = document.getElementById('lbl-home');
  const lblVisitor = document.getElementById('lbl-visitor');
  const playBtn    = document.getElementById('playBtn');
  const banner     = document.getElementById('banner');
  const bannerTitle = document.getElementById('bannerTitle');
  const bannerMsg  = document.getElementById('bannerMsg');
  const cancelBtn  = document.getElementById('cancelBtn');
  const modalOverlay = document.getElementById('modalOverlay');

  cancelBtn.style.display = 'none'; // no cancel on first load

  render();

  // ── Render ─────────────────────────────────────────────────
  function render() {
    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;
    clockEl.textContent = `${pad(m)}:${pad(s)}`;
    numHome.textContent    = state.homeScore;
    numVisitor.textContent = state.visitorScore;
    numPeriod.textContent  = state.period;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  // ── Timer ──────────────────────────────────────────────────
  function toggleTimer() {
    if (state.gameOver) return;
    state.running ? pause() : play();
  }

  function play() {
    if (state.timeLeft <= 0) return;
    state.running = true;
    playBtn.textContent = 'PAUSE';
    ticker = setInterval(() => {
      state.timeLeft--;
      render();
      if (state.timeLeft <= 0) {
        pause();
        flashClock(() => showBanner(state.period >= state.totalPeriods));
      }
    }, 1000);
  }

  function pause() {
    clearInterval(ticker);
    ticker = null;
    state.running = false;
    playBtn.textContent = 'PLAY';
  }

  function resetPeriodTimer() {
    pause();
    state.timeLeft = state.totalMins * 60;
    render();
  }

  function flashClock(cb) {
    let n = 0;
    const id = setInterval(() => {
      clockEl.style.visibility = (++n % 2 === 0) ? 'visible' : 'hidden';
      if (n >= 8) { clearInterval(id); clockEl.style.visibility = 'visible'; cb && cb(); }
    }, 280);
  }

  // ── Period / Game ──────────────────────────────────────────
  function nextPeriod() {
    pause();
    if (state.period < state.totalPeriods) {
      state.period++;
      state.timeLeft = state.totalMins * 60;
      state.gameOver = false;
      render();
    } else {
      showBanner(true);
    }
  }

  function showBanner(isGameOver) {
    state.gameOver = isGameOver;
    const home = lblHome.textContent;
    const vis  = lblVisitor.textContent;
    if (isGameOver) {
      bannerTitle.textContent = 'GAME OVER';
      bannerMsg.innerHTML =
        `Final Score<br>${home} <strong style="color:var(--yellow)">${state.homeScore}</strong>` +
        ` &mdash; ` +
        `<strong style="color:var(--yellow)">${state.visitorScore}</strong> ${vis}`;
      document.querySelector('#banner .ctrl-btn').textContent = 'NEW GAME';
    } else {
      bannerTitle.textContent = `END OF PERIOD ${state.period}`;
      bannerMsg.innerHTML =
        `${home} <strong style="color:var(--yellow)">${state.homeScore}</strong>` +
        ` &mdash; ` +
        `<strong style="color:var(--yellow)">${state.visitorScore}</strong> ${vis}`;
      document.querySelector('#banner .ctrl-btn').textContent = 'CONTINUE';
    }
    banner.classList.add('show');
  }

  function dismissBanner() {
    banner.classList.remove('show');
    if (state.gameOver) {
      openModal();
    } else {
      // advance period
      state.period++;
      state.timeLeft = state.totalMins * 60;
      render();
    }
  }

  // ── Scoring ────────────────────────────────────────────────
  function scoreTeam(team, pts) {
    if (pts < 0) {
      if (team === 'home')    state.homeScore    = Math.max(0, state.homeScore    + pts);
      else                    state.visitorScore = Math.max(0, state.visitorScore + pts);
    } else {
      if (team === 'home') state.homeScore    += pts;
      else                 state.visitorScore += pts;

      // Visual feedback
      const panel = document.getElementById(`panel-${team}`);
      const num   = team === 'home' ? numHome : numVisitor;
      panel.classList.add('scored');
      num.classList.remove('pop');
      void num.offsetWidth; // reflow to restart animation
      num.classList.add('pop');
      setTimeout(() => { panel.classList.remove('scored'); num.classList.remove('pop'); }, 320);
    }
    render();
  }

  // ── Settings modal ─────────────────────────────────────────
  function openModal() {
    pause();
    const hasGame = state.homeScore > 0 || state.visitorScore > 0 || state.period > 1;
    cancelBtn.style.display = hasGame ? '' : 'none';

    document.getElementById('inp-home').value    = lblHome.textContent;
    document.getElementById('inp-visitor').value = lblVisitor.textContent;
    document.getElementById('inp-minutes').value = state.totalMins;
    document.getElementById('inp-periods').value = state.totalPeriods;

    modalOverlay.classList.add('open');
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
  }

  function applySettings() {
    const home    = document.getElementById('inp-home').value.trim()    || 'HOME';
    const visitor = document.getElementById('inp-visitor').value.trim() || 'VISITOR';
    const mins    = clamp(parseInt(document.getElementById('inp-minutes').value) || 10, 1, 99);
    const periods = clamp(parseInt(document.getElementById('inp-periods').value) || 4,  1, 10);

    lblHome.textContent    = home;
    lblVisitor.textContent = visitor;

    state.totalMins    = mins;
    state.totalPeriods = periods;
    state.homeScore    = 0;
    state.visitorScore = 0;
    state.period       = 1;
    state.timeLeft     = mins * 60;
    state.gameOver     = false;
    state.firstLoad    = false;

    render();
    closeModal();
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
</script>
</body>
</html>
