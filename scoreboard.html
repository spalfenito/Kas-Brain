<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sports Scoreboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'DSEG7';
      src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2') format('woff2');
      font-weight: bold;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #FFA800;
      --red:   #FF2200;
      --green: #00BB44;
      --border: 2px solid rgba(255,255,255,0.55);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #060606;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── Board ── */
    .board {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      padding: 1.2vh 3vw;
      gap: 0.8vh;
    }

    /* ── Clock ── */
    .clock-row { display: flex; justify-content: center; }

    .clock-box {
      border: var(--border);
      background: #000;
      padding: 0.6vh 5vw;
    }

    .clock-digits {
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: clamp(38px, 9.5vh, 120px);
      color: var(--amber);
      text-shadow: 0 0 10px rgba(255,168,0,0.4);
      line-height: 1;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Team labels ── */
    .labels-row {
      display: flex;
      align-items: center;
      padding: 0 0.5vw;
    }

    .team-label-group {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8vw;
      overflow: hidden;
      min-width: 0;
    }

    .team-logo {
      height: clamp(42px, 8.5vh, 96px);
      width: auto;
      max-width: clamp(42px, 8.5vh, 96px);
      object-fit: contain;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .team-label {
      font-size: clamp(12px, 2.5vh, 24px);
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .per-label {
      min-width: 9vw;
      text-align: center;
      font-size: clamp(9px, 1.8vh, 16px);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #888;
      text-transform: uppercase;
    }

    /* ── Score panels ── */
    .scores-row {
      display: flex;
      gap: 1vw;
      min-height: 0;
    }

    .score-panel {
      flex: 1;
      border: var(--border);
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .score-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,34,0,0.13);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .score-panel.scored::after { opacity: 1; }

    .score-num {
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: clamp(56px, min(22vh, 15vw), 240px);
      color: var(--red);
      text-shadow: 0 0 10px rgba(255,34,0,0.4);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.09); }
      100% { transform: scale(1); }
    }
    .score-num.pop { animation: pop 0.22s ease; }

    .adj-row {
      display: flex;
      gap: 0.8vw;
      margin-top: 1vh;
    }

    .adj-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(8px, 1.3vh, 13px);
      font-weight: 700;
      background: #181818;
      color: #777;
      border: 1px solid #2e2e2e;
      padding: 0.5vh 1vw;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    .adj-btn:active { background: #2e2e2e; color: #ccc; }

    /* ── Period panel ── */
    .period-panel {
      border: var(--border);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: clamp(48px, 8vw, 110px);
      padding: 0 1.5vw;
    }

    .period-num {
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: clamp(34px, min(11vh, 7vw), 110px);
      color: var(--green);
      text-shadow: 0 0 10px rgba(0,187,68,0.4);
      line-height: 1;
    }

    /* ── Controls ── */
    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.2vw;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: clamp(8px, 1.5vh, 13px);
      background: #0e0e0e;
      color: #999;
      border: 1.5px solid #2e2e2e;
      padding: 0.8vh 2vw;
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .ctrl-btn:active { background: #202020; }
    .ctrl-btn.play { color: var(--amber); border-color: rgba(255,168,0,0.5); }

    /* ══════════════════════════════════════════
       PERIOD / HALFTIME / FINAL BANNER
    ══════════════════════════════════════════ */
    .banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      z-index: 600;
    }
    .banner.show { display: flex; }

    .banner-box {
      border: 2px solid var(--amber);
      background: #050505;
      padding: 4vh 5vw;
      text-align: center;
      max-width: 600px;
      width: 92%;
    }

    /* Normal period-end styles (used via innerHTML) */
    .banner-period-title {
      font-size: clamp(16px, 3.5vh, 30px);
      color: var(--amber);
      letter-spacing: 0.25em;
      margin-bottom: 1.5vh;
    }
    .banner-period-score {
      font-size: clamp(10px, 1.8vh, 16px);
      color: #ccc;
      margin-bottom: 2.5vh;
      letter-spacing: 0.1em;
      line-height: 1.7;
    }

    /* Halftime / Final styles */
    .banner-main-title {
      font-size: clamp(20px, 5vh, 48px);
      font-weight: 900;
      color: var(--amber);
      letter-spacing: 0.35em;
      margin-bottom: 3vh;
    }

    .banner-teams-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 4vw;
      margin-bottom: 3vh;
    }

    .banner-team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1vh;
      flex: 1;
      max-width: 200px;
    }

    .banner-logo-lg {
      height: clamp(60px, 16vh, 150px);
      width: auto;
      max-width: clamp(60px, 16vh, 150px);
      object-fit: contain;
      border-radius: 8px;
    }

    .banner-no-logo {
      height: clamp(60px, 16vh, 150px);
      width: clamp(60px, 16vh, 150px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px, 2vh, 18px);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #444;
      border: 2px solid #282828;
      border-radius: 8px;
    }

    .banner-team-name-lg {
      font-size: clamp(9px, 1.8vh, 16px);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #aaa;
      text-transform: uppercase;
    }

    .banner-score-lg {
      font-family: 'DSEG7', 'Courier New', monospace;
      font-size: clamp(38px, 10vh, 100px);
      color: var(--red);
      text-shadow: 0 0 8px rgba(255,34,0,0.4);
      line-height: 1;
    }

    .banner-divider {
      font-size: clamp(18px, 4vh, 36px);
      color: #333;
      align-self: center;
      padding-top: 6vh;
    }

    /* ══════════════════════════════════════════
       WINNER OVERLAY
    ══════════════════════════════════════════ */
    .winner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #111 0%, #000 75%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 700;
      cursor: pointer;
      text-align: center;
      padding: 4vh 6vw;
    }
    .winner-overlay.show { display: flex; }

    #winnerContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2vh;
      width: 100%;
    }

    @keyframes zoomIn {
      0%   { transform: scale(0.3); opacity: 0; }
      65%  { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes slideUp {
      0%   { transform: translateY(36px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 16px rgba(255,168,0,0.5); }
      50%      { text-shadow: 0 0 48px rgba(255,168,0,1), 0 0 90px rgba(255,168,0,0.4); }
    }

    .winner-logo-img {
      height: clamp(120px, 28vh, 280px);
      width: auto;
      max-width: 65vw;
      object-fit: contain;
      border-radius: 14px;
      animation: zoomIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .winner-no-logo {
      font-size: clamp(48px, 13vh, 130px);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.08em;
      animation: zoomIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .winner-name {
      font-size: clamp(14px, 3.2vh, 34px);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #aaa;
      text-transform: uppercase;
      animation: slideUp 0.4s ease 0.5s both;
    }

    .winner-wins {
      font-size: clamp(42px, 11vh, 110px);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--amber);
      animation: slideUp 0.4s ease 0.7s both, glowPulse 2s ease-in-out 1.1s infinite;
    }

    .winner-tie {
      font-size: clamp(34px, 9vh, 90px);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fff;
      animation: zoomIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .winner-tie-score {
      font-size: clamp(12px, 2.5vh, 24px);
      color: #777;
      letter-spacing: 0.15em;
      animation: slideUp 0.4s ease 0.5s both;
    }

    .winner-tap {
      font-size: clamp(9px, 1.5vh, 13px);
      color: #2e2e2e;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 1vh;
      animation: slideUp 0.4s ease 1.1s both;
    }

    /* ══════════════════════════════════════════
       SETTINGS MODAL
    ══════════════════════════════════════════ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      overflow-y: auto;
      padding: 2vh 0;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #080808;
      border: 2px solid var(--amber);
      padding: 3vh 5vw;
      width: 90%;
      max-width: 420px;
      flex-shrink: 0;
    }

    .modal h2 {
      color: var(--amber);
      font-size: clamp(12px, 1.7vh, 16px);
      letter-spacing: 0.35em;
      text-align: center;
      margin-bottom: 2.5vh;
    }

    .field { margin-bottom: 1.6vh; }

    .field label {
      display: block;
      font-size: clamp(8px, 1vh, 10px);
      letter-spacing: 0.2em;
      color: #666;
      margin-bottom: 0.5vh;
      text-transform: uppercase;
    }

    .field input[type="text"],
    .field input[type="number"] {
      width: 100%;
      background: #121212;
      border: 1px solid #333;
      color: #fff;
      padding: 1vh 2vw;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(12px, 1.6vh, 15px);
      outline: none;
    }
    .field input:focus { border-color: rgba(255,168,0,0.6); }

    .logo-upload-row {
      display: flex;
      align-items: center;
      gap: 1vw;
    }

    .logo-preview-sm {
      width: clamp(32px, 5vh, 48px);
      height: clamp(32px, 5vh, 48px);
      object-fit: contain;
      border: 1px solid #333;
      border-radius: 3px;
      background: #111;
      flex-shrink: 0;
    }

    .upload-label {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(8px, 1.1vh, 11px);
      font-weight: 700;
      letter-spacing: 0.08em;
      background: #181818;
      color: #888;
      border: 1px solid #333;
      padding: 0.7vh 1.5vw;
      cursor: pointer;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .upload-label:active { background: #2a2a2a; }
    .upload-label input[type="file"] { display: none; }

    .remove-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(7px, 1vh, 10px);
      font-weight: 700;
      letter-spacing: 0.05em;
      background: transparent;
      color: #555;
      border: 1px solid #2a2a2a;
      padding: 0.7vh 1vw;
      cursor: pointer;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .remove-btn:active { color: #999; }

    .modal-btns {
      display: flex;
      gap: 1.5vw;
      margin-top: 2.5vh;
    }

    .modal-btns button {
      flex: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(8px, 1.2vh, 12px);
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 1.2vh;
      cursor: pointer;
      background: transparent;
      border: 1.5px solid #2a2a2a;
      color: #777;
      text-transform: uppercase;
    }
    .modal-btns button.primary { border-color: rgba(255,168,0,0.65); color: var(--amber); }
    .modal-btns button:active { background: rgba(255,255,255,0.04); }
  </style>
</head>
<body>

<!-- ═══ Settings Modal ═══ -->
<div class="modal-overlay open" id="modalOverlay">
  <div class="modal">
    <h2>GAME SETUP</h2>

    <div class="field">
      <label>Home Team Name</label>
      <input id="inp-home" type="text" value="HOME" maxlength="12" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Home Team Logo (optional)</label>
      <div class="logo-upload-row">
        <img id="preview-home" class="logo-preview-sm" style="display:none">
        <label class="upload-label">
          Choose Photo
          <input type="file" id="inp-logo-home" accept="image/*" onchange="handleLogo('home',this)">
        </label>
        <button class="remove-btn" type="button" onclick="clearLogo('home')">Remove</button>
      </div>
    </div>

    <div class="field">
      <label>Visitor Team Name</label>
      <input id="inp-visitor" type="text" value="VISITOR" maxlength="12" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Visitor Team Logo (optional)</label>
      <div class="logo-upload-row">
        <img id="preview-visitor" class="logo-preview-sm" style="display:none">
        <label class="upload-label">
          Choose Photo
          <input type="file" id="inp-logo-visitor" accept="image/*" onchange="handleLogo('visitor',this)">
        </label>
        <button class="remove-btn" type="button" onclick="clearLogo('visitor')">Remove</button>
      </div>
    </div>

    <div class="field">
      <label>Minutes Per Period</label>
      <input id="inp-minutes" type="number" value="10" min="1" max="99" inputmode="numeric">
    </div>
    <div class="field">
      <label>Number of Periods</label>
      <input id="inp-periods" type="number" value="4" min="1" max="10" inputmode="numeric">
    </div>

    <div class="modal-btns">
      <button id="cancelBtn" onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="applySettings()">Start Game</button>
    </div>
  </div>
</div>

<!-- ═══ Period / Halftime / Final Banner ═══ -->
<div class="banner" id="banner">
  <div class="banner-box" id="bannerBox"></div>
</div>

<!-- ═══ Winner Overlay ═══ -->
<div class="winner-overlay" id="winnerOverlay" onclick="startNewGame()">
  <div id="winnerContent"></div>
</div>

<!-- ═══ Scoreboard ═══ -->
<div class="board">

  <div class="clock-row">
    <div class="clock-box">
      <div class="clock-digits" id="clock">10:00</div>
    </div>
  </div>

  <div class="labels-row">
    <div class="team-label-group">
      <img class="team-logo" id="logo-home" style="display:none">
      <span class="team-label" id="lbl-home">HOME</span>
    </div>
    <div class="per-label">PER</div>
    <div class="team-label-group">
      <span class="team-label" id="lbl-visitor">VISITOR</span>
      <img class="team-logo" id="logo-visitor" style="display:none">
    </div>
  </div>

  <div class="scores-row">
    <div class="score-panel" id="panel-home" onclick="scoreTeam('home',1)">
      <div class="score-num" id="num-home">0</div>
      <div class="adj-row" onclick="event.stopPropagation()">
        <button class="adj-btn" onclick="scoreTeam('home',2)">+2</button>
        <button class="adj-btn" onclick="scoreTeam('home',3)">+3</button>
        <button class="adj-btn" onclick="scoreTeam('home',-1)">-1</button>
      </div>
    </div>

    <div class="period-panel">
      <div class="period-num" id="num-period">1</div>
    </div>

    <div class="score-panel" id="panel-visitor" onclick="scoreTeam('visitor',1)">
      <div class="score-num" id="num-visitor">0</div>
      <div class="adj-row" onclick="event.stopPropagation()">
        <button class="adj-btn" onclick="scoreTeam('visitor',2)">+2</button>
        <button class="adj-btn" onclick="scoreTeam('visitor',3)">+3</button>
        <button class="adj-btn" onclick="scoreTeam('visitor',-1)">-1</button>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <button class="ctrl-btn play" id="playBtn" onclick="toggleTimer()">PLAY</button>
    <button class="ctrl-btn" onclick="resetPeriodTimer()">RESET</button>
    <button class="ctrl-btn" onclick="nextPeriod()">NEXT PER</button>
    <button class="ctrl-btn" onclick="openModal()">SETTINGS</button>
  </div>

</div>

<script>
  const state = {
    homeScore: 0, visitorScore: 0,
    period: 1, totalPeriods: 4,
    totalMins: 10, timeLeft: 600,
    running: false, gameOver: false,
    homeLogo: null, visitorLogo: null,
    bannerType: '',
  };

  let ticker = null;

  const clockEl      = document.getElementById('clock');
  const numHome      = document.getElementById('num-home');
  const numVisitor   = document.getElementById('num-visitor');
  const numPeriod    = document.getElementById('num-period');
  const lblHome      = document.getElementById('lbl-home');
  const lblVisitor   = document.getElementById('lbl-visitor');
  const playBtn      = document.getElementById('playBtn');
  const banner       = document.getElementById('banner');
  const bannerBox    = document.getElementById('bannerBox');
  const cancelBtn    = document.getElementById('cancelBtn');
  const modalOverlay = document.getElementById('modalOverlay');

  cancelBtn.style.display = 'none';
  render();

  // ── Render ────────────────────────────────────────────────
  function render() {
    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;
    clockEl.textContent    = `${pad(m)}:${pad(s)}`;
    numHome.textContent    = state.homeScore;
    numVisitor.textContent = state.visitorScore;
    numPeriod.textContent  = state.period;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Timer ─────────────────────────────────────────────────
  function toggleTimer() {
    if (state.gameOver) return;
    state.running ? pause() : play();
  }

  function play() {
    if (state.timeLeft <= 0) return;
    state.running = true;
    playBtn.textContent = 'PAUSE';
    ticker = setInterval(() => {
      state.timeLeft--;
      render();
      if (state.timeLeft <= 0) {
        pause();
        flashClock(() => showBanner(detectBannerType()));
      }
    }, 1000);
  }

  function pause() {
    clearInterval(ticker); ticker = null;
    state.running = false;
    playBtn.textContent = 'PLAY';
  }

  function resetPeriodTimer() {
    pause();
    state.timeLeft = state.totalMins * 60;
    render();
  }

  function flashClock(cb) {
    let n = 0;
    const id = setInterval(() => {
      clockEl.style.visibility = (++n % 2 === 0) ? 'visible' : 'hidden';
      if (n >= 8) { clearInterval(id); clockEl.style.visibility = 'visible'; cb && cb(); }
    }, 280);
  }

  // ── Period / Banner logic ─────────────────────────────────
  function detectBannerType() {
    if (state.period >= state.totalPeriods) return 'final';
    const half = Math.floor(state.totalPeriods / 2);
    if (state.totalPeriods > 1 && state.period === half) return 'halftime';
    return 'period';
  }

  function nextPeriod() {
    pause();
    const type = detectBannerType();
    if (type === 'final') {
      showBanner('final');
    } else if (type === 'halftime') {
      showBanner('halftime');
    } else {
      state.period++;
      state.timeLeft = state.totalMins * 60;
      state.gameOver = false;
      render();
    }
  }

  function showBanner(type) {
    state.bannerType = type;
    const h = lblHome.textContent;
    const v = lblVisitor.textContent;

    if (type === 'halftime' || type === 'final') {
      state.gameOver = (type === 'final');
      const title = type === 'halftime' ? 'HALFTIME' : 'FINAL';
      const btnLabel = type === 'halftime' ? 'CONTINUE' : 'TAP FOR RESULTS';

      const homeLogo  = state.homeLogo
        ? `<img class="banner-logo-lg" src="${state.homeLogo}">`
        : `<div class="banner-no-logo">${esc(h)}</div>`;
      const visitorLogo = state.visitorLogo
        ? `<img class="banner-logo-lg" src="${state.visitorLogo}">`
        : `<div class="banner-no-logo">${esc(v)}</div>`;

      bannerBox.innerHTML = `
        <div class="banner-main-title">${title}</div>
        <div class="banner-teams-row">
          <div class="banner-team-block">
            ${homeLogo}
            <div class="banner-team-name-lg">${esc(h)}</div>
            <div class="banner-score-lg">${state.homeScore}</div>
          </div>
          <div class="banner-divider">&mdash;</div>
          <div class="banner-team-block">
            ${visitorLogo}
            <div class="banner-team-name-lg">${esc(v)}</div>
            <div class="banner-score-lg">${state.visitorScore}</div>
          </div>
        </div>
        <button class="ctrl-btn play" onclick="dismissBanner()">${btnLabel}</button>
      `;
    } else {
      bannerBox.innerHTML = `
        <div class="banner-period-title">END OF PERIOD ${state.period}</div>
        <div class="banner-period-score">${esc(h)}&nbsp;&nbsp;${state.homeScore}&nbsp;&mdash;&nbsp;${state.visitorScore}&nbsp;&nbsp;${esc(v)}</div>
        <button class="ctrl-btn play" onclick="dismissBanner()">CONTINUE</button>
      `;
    }

    banner.classList.add('show');
  }

  function dismissBanner() {
    banner.classList.remove('show');
    if (state.bannerType === 'final') {
      showWinner();
    } else {
      state.period++;
      state.timeLeft = state.totalMins * 60;
      state.gameOver = false;
      render();
    }
  }

  // ── Winner screen ─────────────────────────────────────────
  function showWinner() {
    const content = document.getElementById('winnerContent');
    const h = lblHome.textContent;
    const v = lblVisitor.textContent;
    let html;

    if (state.homeScore === state.visitorScore) {
      html = `
        <div class="winner-tie">TIE GAME!</div>
        <div class="winner-tie-score">${esc(h)}&nbsp;${state.homeScore}&nbsp;&mdash;&nbsp;${state.visitorScore}&nbsp;${esc(v)}</div>
        <div class="winner-tap">TAP FOR NEW GAME</div>
      `;
    } else {
      const homeWins = state.homeScore > state.visitorScore;
      const name = homeWins ? h : v;
      const logo = homeWins ? state.homeLogo : state.visitorLogo;
      const logoHtml = logo
        ? `<img class="winner-logo-img" src="${logo}">`
        : `<div class="winner-no-logo">${esc(name)}</div>`;
      html = `
        ${logoHtml}
        <div class="winner-name">${esc(name)}</div>
        <div class="winner-wins">WINS!</div>
        <div class="winner-tap">TAP FOR NEW GAME</div>
      `;
    }

    content.innerHTML = html;
    document.getElementById('winnerOverlay').classList.add('show');
  }

  function startNewGame() {
    document.getElementById('winnerOverlay').classList.remove('show');
    state.gameOver = false;
    openModal();
  }

  // ── Scoring ───────────────────────────────────────────────
  function scoreTeam(team, pts) {
    if (pts < 0) {
      if (team === 'home') state.homeScore = Math.max(0, state.homeScore + pts);
      else                 state.visitorScore = Math.max(0, state.visitorScore + pts);
    } else {
      if (team === 'home') state.homeScore += pts;
      else                 state.visitorScore += pts;

      const panel = document.getElementById(`panel-${team}`);
      const num   = team === 'home' ? numHome : numVisitor;
      panel.classList.add('scored');
      num.classList.remove('pop');
      void num.offsetWidth;
      num.classList.add('pop');
      setTimeout(() => { panel.classList.remove('scored'); num.classList.remove('pop'); }, 300);
    }
    render();
  }

  // ── Logo handling ─────────────────────────────────────────
  function handleLogo(team, input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const src = e.target.result;
      const preview = document.getElementById(`preview-${team}`);
      preview.src = src;
      preview.style.display = '';
      if (team === 'home') state.homeLogo = src;
      else                 state.visitorLogo = src;
    };
    reader.readAsDataURL(input.files[0]);
  }

  function clearLogo(team) {
    if (team === 'home') {
      state.homeLogo = null;
      document.getElementById('preview-home').style.display = 'none';
      document.getElementById('inp-logo-home').value = '';
    } else {
      state.visitorLogo = null;
      document.getElementById('preview-visitor').style.display = 'none';
      document.getElementById('inp-logo-visitor').value = '';
    }
    applyLogoToBoard(team);
  }

  function applyLogoToBoard(team) {
    const el  = document.getElementById(`logo-${team}`);
    const src = team === 'home' ? state.homeLogo : state.visitorLogo;
    if (src) { el.src = src; el.style.display = ''; }
    else     { el.style.display = 'none'; }
  }

  // ── Settings ──────────────────────────────────────────────
  function openModal() {
    pause();
    const hasGame = state.homeScore > 0 || state.visitorScore > 0 || state.period > 1;
    cancelBtn.style.display = hasGame ? '' : 'none';
    document.getElementById('inp-home').value    = lblHome.textContent;
    document.getElementById('inp-visitor').value = lblVisitor.textContent;
    document.getElementById('inp-minutes').value = state.totalMins;
    document.getElementById('inp-periods').value = state.totalPeriods;
    ['home','visitor'].forEach(t => {
      const src = t === 'home' ? state.homeLogo : state.visitorLogo;
      const el  = document.getElementById(`preview-${t}`);
      if (src) { el.src = src; el.style.display = ''; }
      else     { el.style.display = 'none'; }
    });
    modalOverlay.classList.add('open');
  }

  function closeModal() { modalOverlay.classList.remove('open'); }

  function applySettings() {
    const home    = document.getElementById('inp-home').value.trim()    || 'HOME';
    const visitor = document.getElementById('inp-visitor').value.trim() || 'VISITOR';
    const mins    = clamp(parseInt(document.getElementById('inp-minutes').value) || 10, 1, 99);
    const periods = clamp(parseInt(document.getElementById('inp-periods').value) || 4,  1, 10);

    lblHome.textContent    = home;
    lblVisitor.textContent = visitor;
    state.totalMins    = mins;
    state.totalPeriods = periods;
    state.homeScore    = 0;
    state.visitorScore = 0;
    state.period       = 1;
    state.timeLeft     = mins * 60;
    state.gameOver     = false;
    state.bannerType   = '';

    applyLogoToBoard('home');
    applyLogoToBoard('visitor');
    render();
    closeModal();
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
</script>
</body>
</html>
